name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      netbsd-release:
        description: NetBSD release to build from
        required: false
      firecracker-version:
        description: Firecracker version to build from (include the leading v)
        required: false

permissions:
  contents: write

env:
  FIRECRACKER_VERSION: ${{ inputs.firecracker-version || 'v1.16.1' }}
  NETBSD_RELEASE: ${{ inputs.netbsd-release || '11.0_RC6' }}

jobs:
  build:
    name: Build kernel and rootfs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build kernel (and cross toolchain)
        run: ./build-kernel.sh

      - name: Generate SSH keypair
        run: ./generate-ssh-key.sh

      - name: Build rootfs
        run: sudo -E ./build-rootfs.sh

      - name: Fetch Firecracker
        run: ./fetch-firecracker.sh

      - name: Smoke test
        run: sudo ./run-local.sh

      - name: Archive build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: netbsd-firecracker
          path: |
            out/netbsd-kern.bin
            out/netbsd-rootfs.bin.xz
            out/firecracker
            out/netbsd.id_rsa
            out/netbsd.id_rsa.pub

  release:
    name: Publish release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: netbsd-firecracker
          path: out

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }} (NetBSD ${NETBSD_RELEASE})" \
            --generate-notes \
            out/netbsd-kern.bin \
            out/netbsd-rootfs.bin.xz \
            out/firecracker \
            out/netbsd.id_rsa \
            out/netbsd.id_rsa.pub
