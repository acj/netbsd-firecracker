# Local kernel config overlay for GitHub Actions runner quirks, if any turn up.
# Unused by default — build-kernel.sh builds stock MICROVM unless
# KERNEL_CONFIG=FIRECRACKER is set. Keep quirks here instead of patching the
# NetBSD tree, so the kernel stays reproducible from official source sets.

include "arch/amd64/conf/MICROVM"

#ident		"FIRECRACKER-$Revision$"

# 11.0_RC5 doesn't resolve root=ld0a from the PVH command line under
# Firecracker (boot device stays <unknown> and setroot loops on
# "unknown device major" before prompting). Pin the root device at
# config time instead; the guest always boots from the first virtio disk.
no config netbsd
config		netbsd	root on ld0a type ffs

# Examples of the kind of overrides that might be needed:
#options 	CONSDEVNAME="\"com\"",CONADDR=0x3f8,CONSPEED=115200
#no options 	SOMETHING_THAT_BREAKS_ON_GHA
