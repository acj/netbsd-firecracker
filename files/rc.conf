# Guest rc.conf for the netbsd-firecracker CI image.

rc_configured=YES

hostname=netbsd-firecracker

# Static network derived from the MAC address Firecracker assigns (see rc.d/fcnet).
fcnet=YES
dhcpcd=NO

sshd=YES

# Grow the root filesystem to fill the (host-side truncated) disk image on boot.
# Requires the root fs to be mounted without WAPBL logging (plain `rw` in fstab).
# resize_ffs grows the on-disk filesystem, but the still-mounted (read-only)
# root keeps its old in-core superblock, and the ro->rw remount doesn't re-read
# it. NetBSD's embedded images solve this with resize_root_postcmd="/sbin/reboot
# -n", but a guest reboot makes Firecracker exit, so reload the superblock in
# place instead (rdonly keeps ffs_reload happy; rc.d/root remounts rw after).
resize_root=YES
resize_root_postcmd="/sbin/mount -u -o reload,rdonly /"

# Keep boot lean; none of these are useful in a serial-console microVM.
wscons=NO
makemandb=NO
savecore=NO
virecover=NO
postfix=NO
cron=NO
