# Guest rc.conf for the netbsd-firecracker CI image.

rc_configured=YES

hostname=netbsd-firecracker

# Static network derived from the MAC address Firecracker assigns (see rc.d/fcnet).
fcnet=YES
dhcpcd=NO

sshd=YES

# Grow the root filesystem to fill the (host-side truncated) disk image on boot.
# Requires the root fs to be mounted without WAPBL logging (plain `rw` in fstab).
# resize_ffs only grows the on-disk filesystem; the mounted root keeps its
# stale in-core superblock, which ffs can't reload after a grow (fs_ncg
# changes), and which would be synced back over the resized one. Reboot
# immediately instead, like NetBSD's embedded images (-n skips that sync).
# Firecracker exits on guest reboot, so the launcher relaunches the VM once
# after a first-boot resize (see run-local.sh).
resize_root=YES
resize_root_postcmd="/sbin/reboot -n"

# Keep boot lean; none of these are useful in a serial-console microVM.
wscons=NO
makemandb=NO
savecore=NO
virecover=NO
postfix=NO
cron=NO
